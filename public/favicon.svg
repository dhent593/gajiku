<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="50%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    
    <!-- White-to-Silver Gradient for the S -->
    <linearGradient id="s-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    
    <!-- Gold Gradient for the Coin/Accent -->
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    
    <!-- Shadow Filter for Depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Rounded App Icon Background -->
  <rect width="512" height="512" rx="140" fill="url(#bg-gradient)" />
  
  <!-- Subtle inner glow ring -->
  <rect x="16" y="16" width="480" height="480" rx="124" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.15" />

  <!-- Shadow Group for all elements inside -->
  <g filter="url(#shadow)">
    <!-- Gold Coin Nested in the Bottom Loop of S -->
    <circle cx="260" cy="330" r="32" fill="url(#gold-gradient)" />
    <!-- Dollar sign inside the coin -->
    <path d="M 260,314 L 260,346 M 254,320 C 266,316 266,326 260,330 C 254,334 254,344 266,340" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="4" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- S Ribbon ending in an arrow pointing up-right -->
    <path d="M 160,340 C 200,400 310,400 320,330 C 330,260 190,270 200,200 C 210,130 310,120 370,170 L 400,140" 
          fill="none" 
          stroke="url(#s-gradient)" 
          stroke-width="52" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- Arrowhead at (400, 140) pointing up-right -->
    <path d="M 330,140 L 400,140 L 400,210" 
          fill="none" 
          stroke="url(#s-gradient)" 
          stroke-width="52" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Sparkling Gold Star Accent -->
    <path d="M 370,225 Q 370,245 390,245 Q 370,245 370,265 Q 370,245 350,245 Q 370,245 370,225 Z" 
          fill="url(#gold-gradient)" />
  </g>
</svg>